name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build RPMs and publish GitHub Release
    runs-on: ubuntu-latest
    container: fedora:latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: ./install_deps.sh

      - name: Build library
        run: ./build.sh

      - name: Package RPMs
        run: ./build_rpm.sh --package-only

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: build/*.rpm
